<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORCHESTRA | Realtime Factory Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getDatabase, ref, onValue, update, push } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

        // CONFIGURATION - Replace with your Firebase details
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'brandix-orchestrator';
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // STATE
        let tasks = {};
        let selectedTaskId = null;

        // DATA SYNC (Realtime Database Path)
        const tasksRef = ref(db, `artifacts/${appId}/public/data/tasks`);
        
        onValue(tasksRef, (snapshot) => {
            const data = snapshot.val();
            tasks = data || {};
            renderTaskList();
            if (selectedTaskId) renderDetails(selectedTaskId);
        }, (error) => {
            console.error("Sync Error:", error);
            document.getElementById('status-bar').innerHTML = `<span class="text-red-500">Sync Error: Check Firebase Rules</span>`;
        });

        // UI RENDERING
        function renderTaskList() {
            const listEl = document.getElementById('task-list');
            listEl.innerHTML = Object.keys(tasks).length === 0 ? '<p class="p-8 text-slate-400 text-center">No Tech Packs received yet...</p>' : '';
            
            Object.keys(tasks).reverse().forEach(id => {
                const task = tasks[id];
                const statusColors = {
                    'pending': 'bg-amber-100 text-amber-700 border-amber-200',
                    'approved': 'bg-green-100 text-green-700 border-green-200',
                    'rejected': 'bg-rose-100 text-rose-700 border-rose-200'
                };

                const div = document.createElement('div');
                div.className = `p-4 mb-3 rounded-xl border cursor-pointer transition-all ${selectedTaskId === id ? 'border-indigo-500 bg-indigo-50 shadow-md' : 'border-slate-200 bg-white hover:border-indigo-300'}`;
                div.onclick = () => {
                    selectedTaskId = id;
                    renderTaskList();
                    renderDetails(id);
                };
                
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-slate-800">${task.company || 'Unknown Client'}</h3>
                            <p class="text-[10px] text-slate-500 truncate w-32">${task.client}</p>
                        </div>
                        <span class="text-[9px] font-black uppercase px-2 py-1 rounded border ${statusColors[task.status] || 'bg-slate-100'}">
                            ${task.status}
                        </span>
                    </div>
                `;
                listEl.appendChild(div);
            });
        }

        function renderDetails(id) {
            const task = tasks[id];
            const detailEl = document.getElementById('detail-view');
            if (!task) return;

            detailEl.innerHTML = `
                <div class="animate-in fade-in slide-in-from-right-4 duration-300">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                        <h2 class="text-3xl font-black text-indigo-900">${task.company}</h2>
                        <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-full border border-slate-200 shadow-sm">
                            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Live from Database</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                            <h4 class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-4">AI Extraction Analysis</h4>
                            <p class="text-sm font-semibold text-slate-700 leading-relaxed mb-6">${task.summary || 'Analyzing document structure...'}</p>
                            <div class="flex flex-wrap gap-2">
                                <span class="bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-black uppercase">Season: ${task.dates || 'N/A'}</span>
                                <span class="bg-slate-50 text-slate-600 px-3 py-1.5 rounded-lg text-xs font-black uppercase">From: ${task.client}</span>
                            </div>
                        </div>
                        
                        <div class="bg-slate-900 text-white p-6 rounded-3xl shadow-xl">
                            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Department Routing</h4>
                            <div class="space-y-4">
                                <div class="flex items-center justify-between p-2 rounded-lg bg-white/5 border border-white/10">
                                    <span class="text-xs font-bold opacity-60">Sourcing</span>
                                    <span class="text-[10px] font-bold">sourcing@factory.com</span>
                                </div>
                                <div class="flex items-center justify-between p-2 rounded-lg bg-white/5 border border-white/10">
                                    <span class="text-xs font-bold opacity-60">Production</span>
                                    <span class="text-[10px] font-bold">floor@factory.com</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    ${task.status === 'pending' ? `
                    <div class="flex flex-col sm:flex-row gap-4">
                        <button onclick="updateStatus('${id}', 'rejected')" class="flex-1 py-4 border-2 border-slate-200 text-slate-400 font-bold rounded-2xl hover:border-rose-300 hover:text-rose-600 transition-all uppercase tracking-widest text-xs">
                            Reject Tech Pack
                        </button>
                        <button onclick="updateStatus('${id}', 'approved')" class="flex-[2] py-4 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-700 shadow-2xl shadow-indigo-200 transition-all flex items-center justify-center gap-2 uppercase tracking-widest text-xs">
                            Approve & Dispatch <i data-lucide="zap" size="16"></i>
                        </button>
                    </div>
                    ` : `
                    <div class="bg-indigo-600 p-8 rounded-3xl text-white flex items-center justify-between shadow-2xl">
                        <div>
                            <p class="text-2xl font-black uppercase tracking-tighter italic">Order Dispatched</p>
                            <p class="text-xs font-bold opacity-70">Automated factory-wide notification complete.</p>
                        </div>
                        <div class="p-4 bg-white/20 rounded-full">
                             <i data-lucide="check" size="32"></i>
                        </div>
                    </div>
                    `}
                </div>
            `;
            lucide.createIcons();
        }

        window.updateStatus = async (id, status) => {
            const taskRef = ref(db, `artifacts/${appId}/public/data/tasks/${id}`);
            await update(taskRef, { 
                status: status,
                approvedAt: new Date().toISOString()
            });
        };

        window.onload = () => lucide.createIcons();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-600 rounded-2xl rotate-3 flex items-center justify-center text-white shadow-lg">
                    <i data-lucide="cpu"></i>
                </div>
                <div>
                    <h1 class="font-black text-2xl tracking-tighter">ORCHESTRA</h1>
                    <div id="status-bar" class="flex items-center gap-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-ping"></span>
                        <p class="text-[9px] font-black uppercase text-slate-400 tracking-[0.3em]">Realtime DB Connected</p>
                    </div>
                </div>
            </div>
            <div class="text-right hidden sm:block">
                <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-1">Production Node</p>
                <p class="text-xs font-bold text-indigo-600">Local-to-Cloud Bridge Active</p>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto grid grid-cols-12 gap-8 px-6 pb-12">
        
        <!-- Sidebar -->
        <aside class="col-span-12 lg:col-span-4">
            <div class="bg-white rounded-[2rem] p-6 border border-slate-200 shadow-sm h-full">
                <div class="flex items-center justify-between mb-6 px-2">
                    <h2 class="font-black text-xs uppercase tracking-[0.2em] text-slate-400">Incoming Feed</h2>
                    <i data-lucide="activity" class="text-indigo-600" size="16"></i>
                </div>
                <div id="task-list" class="space-y-2">
                    <!-- Data loads here -->
                </div>
            </div>
        </aside>

        <!-- Details -->
        <section id="detail-view" class="col-span-12 lg:col-span-8 min-h-[60vh] flex items-center justify-center bg-slate-100/50 rounded-[3rem] border-4 border-dashed border-white">
            <div class="text-center p-12">
                <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl">
                    <i data-lucide="scan-search" size="40" class="text-indigo-200"></i>
                </div>
                <h3 class="text-2xl font-black text-slate-300 uppercase tracking-widest">Awaiting Selection</h3>
                <p class="text-sm text-slate-300 font-bold mt-2">Select a factory submission to begin the orchestration.</p>
            </div>
        </section>

    </div>

</body>
</html>
